<!DOCTYPE html>
<html lang='ru'>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='Content-Type' content='text/html; charset=utf-8'/>
    <meta name='viewport'
          content='width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0'>
    <meta http-equiv='X-UA-Compatible' content='ie=edge'>
    <title>Start</title>
    <meta name='description' content=''>
    <link rel='shortcut icon' href='./favicon.ico' type='image/x-icon'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1'/>

    <link rel='stylesheet' href='css/main.min.css'>
</head>
<body>

<div class='chat'>

    <header class='chat-header'>
        <div class='chat-header__logo'>
            <img src='./img/logo.svg' alt='логотип'>
        </div>
        <div class='chat-header__my-ava'>
            <button class='setting'></button>
            <div class='photo'>
                <img src='./img/photo-ava.jpg' alt=''>
            </div>
        </div>
    </header>

    <section class='chat-content'>

        <div class='chat-content__block-users'>

            <div class='chat-content__search'>
                <input type='search' placeholder='Search User'>
            </div>

            <ul class='chat-content__list-users' data-simplebar>
                <li class='chat-content__user  user-active active-chat'>
                    <div class='user-ava'>
                        <img src='./img/photo-user.jpg' alt='avatar'>
                    </div>
                    <div class='user-name'>Александ Гурков</div>
                </li>
            </ul>
        </div>

        <div class='chat-content__block-text' data-simplebar>
            <div class='chat-content__message'>Привет! Как твои дела?</div>
        </div>

    </section>

    <footer class='chat-footer'>
        <button class='chat-footer__button-smile'></button>
        <input class='chat-footer__text' type='text' placeholder='Type message'>
        <button class='chat-footer__pen'></button>
        <button class='chat-footer__photo'></button>
        <button class='chat-footer__record'></button>
        <button class='chat-footer__button'></button>
    </footer>
</div>

<script src='js/scripts.min.js'></script>
</body>
</html>
